services:
  finance-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finance-app
    ports:
      - "8000:8000"
    volumes:
      # User's persistent project: foundation md files, market.db, transactions,
      # API key, sessions, logs. Survives container restarts. On first start,
      # this directory is seeded from /app/template inside the image.
      - ./project:/app/project
    restart: unless-stopped
